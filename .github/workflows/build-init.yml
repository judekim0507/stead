name: Start Building Stead for macOS

defaults:
  run:
    shell: bash

permissions:
  contents: write

on:
  workflow_call:
    inputs:
      arch:
        required: true
        type: string
      os:
        required: true
        type: string
      resume-run-id:
        required: false
        type: string
        default: ""
    outputs:
      status:
        value: ${{ jobs.build_job.outputs.status }}

jobs:
  build_job:
    name: Start Building Stead for macOS
    runs-on: ${{ inputs.os }}
    outputs:
      status: ${{ steps.build.outputs.status }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          submodules: true
      - uses: ./.github/actions/prepare-environment
      - name: Download resources
        if: ${{ inputs.resume-run-id == '' }}
        uses: actions/download-artifact@v4
        with:
          name: stead_macos_resources_${{ inputs.arch }}
      - name: Unpack resources
        if: ${{ inputs.resume-run-id == '' }}
        run: ./github_unpack_resources.sh && ls -la
      - name: Download build archive from prior run
        if: ${{ inputs.resume-run-id != '' }}
        uses: actions/download-artifact@v4
        with:
          name: github_build_artifact_${{ inputs.arch }}
          run-id: ${{ inputs.resume-run-id }}
          github-token: ${{ github.token }}
      - name: Unpack prior build archive
        if: ${{ inputs.resume-run-id != '' }}
        run: ./github_unpack_archive.sh
      - name: Re-sync stead-owned sources from current patches
        if: ${{ inputs.resume-run-id != '' }}
        run: ./github_resync_stead.sh
      - name: Prepare for building
        run: ./github_before_build.sh ${{ inputs.arch }} | tee -a github_actions_build_${{ inputs.arch }}.log
        env:
          PROD_MACOS_SPARKLE_ED_PUB_KEY: ${{ secrets.PROD_MACOS_SPARKLE_ED_PUB_KEY }}

      - uses: ./.github/actions/do-build
        id: build
        with:
          arch: ${{ inputs.arch }}
          os: ${{ inputs.os }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MACOS_CERTIFICATE: ${{ secrets.PROD_MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.PROD_MACOS_CERTIFICATE_PWD }}
          MACOS_CERTIFICATE_NAME: ${{ secrets.PROD_MACOS_CERTIFICATE_NAME }}
          MACOS_CI_KEYCHAIN_PWD: ${{ secrets.PROD_MACOS_CI_KEYCHAIN_PWD }}
          PROD_MACOS_NOTARIZATION_APPLE_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_APPLE_ID }}
          PROD_MACOS_NOTARIZATION_TEAM_ID: ${{ secrets.PROD_MACOS_NOTARIZATION_TEAM_ID }}
          PROD_MACOS_NOTARIZATION_PWD: ${{ secrets.PROD_MACOS_NOTARIZATION_PWD }}
          PROD_MACOS_SPECIAL_ENTITLEMENTS_PROFILE_B64: ${{ secrets.PROD_MACOS_SPECIAL_ENTITLEMENTS_PROFILE_B64 }}
